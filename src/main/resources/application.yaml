server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: java-admin-system
  datasource:
    url: jdbc:mysql://localhost:3306/java_admin_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: kr754454968
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 55000
      database: 0
      connect-timeout: 2000ms
      timeout: 3000ms
  flyway:
    enabled: true
    # 迁移脚本目录，默认 classpath:db/migration
    locations: classpath:db/migration
    # 允许对非空数据库执行迁移（首次接入已有库时需要）
    baseline-on-migrate: true
    baseline-version: 0
    # 编码
    encoding: UTF-8

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

sa-token:
  token-name: Authorization
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: jwt
  is-log: true
  jwt-secret-key: admin-system-secret-key-2024-jwt-hs256-default-change-me
